<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrailQuest — AI Scavenger Hunts for Any Trail</title>
<style>
  :root {
    --green: #2f7d4f; --green-dark: #1f5637; --sand: #f4efe6;
    --ink: #1c2419; --gold: #e0a458; --card: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #dff1e3 0%, #f4efe6 100%);
    color: var(--ink); min-height: 100vh;
  }
  header {
    text-align: center; padding: 28px 16px 12px;
  }
  header h1 { margin: 0; font-size: 2.1rem; color: var(--green-dark); letter-spacing: -0.5px; }
  header p { margin: 6px 0 0; color: #56604f; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
  .card {
    background: var(--card); border-radius: 16px; padding: 20px;
    box-shadow: 0 8px 24px rgba(31,86,55,0.10); margin-bottom: 18px;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  input[type=text] {
    flex: 1; min-width: 200px; padding: 12px 14px; border: 1px solid #cdd6c8;
    border-radius: 10px; font-size: 1rem;
  }
  button {
    background: var(--green); color: #fff; border: none; padding: 12px 18px;
    border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: transform .05s ease, background .2s;
  }
  button:hover { background: var(--green-dark); }
  button:active { transform: scale(0.98); }
  button.ghost { background: transparent; color: var(--green-dark); border: 1px solid var(--green); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .modes { display: flex; gap: 8px; margin-bottom: 12px; }
  .chip { padding: 8px 14px; border-radius: 999px; border: 1px solid #cdd6c8;
    background: #fff; cursor: pointer; font-weight: 600; color: #56604f; }
  .chip.active { background: var(--green); color: #fff; border-color: var(--green); }
  .scorebar { display: flex; justify-content: space-between; align-items: center;
    background: var(--green-dark); color: #fff; border-radius: 12px; padding: 12px 18px; margin-bottom: 16px; }
  .scorebar .score { font-size: 1.4rem; font-weight: 700; }
  .hunt-title { font-size: 1.5rem; color: var(--green-dark); margin: 4px 0 14px; }
  .challenge { border: 1px solid #e4e9df; border-radius: 12px; padding: 14px; margin-bottom: 12px;
    display: flex; gap: 12px; align-items: flex-start; }
  .challenge.done { background: #eef7ee; border-color: #bfe0c2; }
  .challenge .pts { background: var(--gold); color: #4a2f10; font-weight: 700;
    border-radius: 8px; padding: 4px 8px; font-size: .85rem; white-space: nowrap; }
  .challenge .body { flex: 1; }
  .challenge .body h3 { margin: 0 0 4px; font-size: 1.05rem; }
  .challenge .body p { margin: 0 0 8px; color: #56604f; font-size: .92rem; }
  .challenge.done .check { color: var(--green); font-weight: 700; }
  video, canvas { width: 100%; border-radius: 12px; background: #000; }
  .cam-actions { display: flex; gap: 10px; margin-top: 10px; }
  .status { margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-size: .92rem; }
  .status.ok { background: #e6f5e9; color: #1f5637; }
  .status.no { background: #fdecec; color: #a3352f; }
  .status.busy { background: #fff6e5; color: #8a5a12; }
  .hidden { display: none; }
  .recap { background: linear-gradient(160deg, var(--green-dark), var(--green));
    color: #fff; border-radius: 16px; padding: 24px; text-align: center; }
  .recap h2 { margin: 0 0 10px; }
  .recap p { font-size: 1.1rem; line-height: 1.5; }
  .spinner { display:inline-block; width:16px; height:16px; border:3px solid rgba(255,255,255,.4);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { text-align:center; color:#7a8473; font-size:.85rem; padding: 8px 0 30px; }
</style>
</head>
<body>
<header>
  <h1>🌲 TrailQuest</h1>
  <p>Turn any trail into an AI-powered adventure game.</p>
</header>

<div class="wrap">
  <!-- SETUP -->
  <div id="setup" class="card">
    <div class="modes">
      <div class="chip active" data-mode="trail" onclick="setMode('trail')">🥾 Trail</div>
      <div class="chip" data-mode="venue" onclick="setMode('venue')">🏢 Venue (indoor demo)</div>
    </div>
    <div class="row">
      <input id="place" type="text" placeholder="Paste an AllTrails link or trail name…" />
      <button id="genBtn" onclick="generateHunt()">Generate Quest</button>
    </div>
    <p id="setupHint" style="color:#7a8473;font-size:.85rem;margin:10px 0 0;">
      Tip: use <b>Venue</b> mode to let judges play live indoors with a webcam.
    </p>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="scorebar">
      <span>Adventure Score</span>
      <span class="score"><span id="score">0</span> pts</span>
    </div>
    <div class="card">
      <div id="huntTitle" class="hunt-title"></div>
      <div id="challenges"></div>
    </div>

    <!-- CAMERA -->
    <div id="camCard" class="card hidden">
      <div id="activeClue" style="font-weight:600;margin-bottom:10px;"></div>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" class="hidden"></canvas>
      <div class="cam-actions">
        <button id="snapBtn" onclick="snap()">📸 Capture & Verify</button>
        <button class="ghost" onclick="closeCam()">Cancel</button>
      </div>
      <div id="status" class="status hidden"></div>
    </div>
  </div>

  <!-- RECAP -->
  <div id="recapCard" class="recap hidden">
    <h2>🏆 Quest Complete!</h2>
    <p id="recapText"></p>
    <button class="ghost" style="color:#fff;border-color:#fff;margin-top:8px;" onclick="location.reload()">New Adventure</button>
  </div>
</div>

<footer>Built at RampHacks · Powered by OpenAI vision + generation</footer>

<script>
let mode = "trail";
let hunt = null;
let score = 0;
let activeIdx = null;
let stream = null;

function setMode(m) {
  mode = m;
  document.querySelectorAll(".chip").forEach(c =>
    c.classList.toggle("active", c.dataset.mode === m));
  document.getElementById("place").placeholder = m === "venue"
    ? "Optional — e.g. 'the hackathon hall' (or leave blank)"
    : "Paste an AllTrails link or trail name…";
}

async function generateHunt() {
  const btn = document.getElementById("genBtn");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generating…';
  try {
    const res = await fetch("/api/generate", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ place: document.getElementById("place").value, mode })
    });
    hunt = await res.json();
    if (hunt.error || !hunt.challenges) {
      alert(hunt.error || "Generation failed — check the server and your API key.");
      return;
    }
    renderHunt();
  } catch (e) {
    alert("Generation failed — check the server and your API key.");
  } finally {
    btn.disabled = false; btn.textContent = "Generate Quest";
  }
}

function renderHunt() {
  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("huntTitle").textContent = hunt.hunt_title || "Your Quest";
  const list = document.getElementById("challenges");
  list.innerHTML = "";
  hunt.challenges.forEach((c, i) => {
    c.done = false;
    const el = document.createElement("div");
    el.className = "challenge";
    el.id = "ch-" + i;
    el.innerHTML = `
      <div class="body">
        <h3>${c.title}</h3>
        <p>${c.clue}</p>
        <button onclick="openCam(${i})">📷 Attempt</button>
      </div>
      <span class="pts">${c.points} pts</span>`;
    list.appendChild(el);
  });
}

async function openCam(i) {
  activeIdx = i;
  document.getElementById("activeClue").textContent = "🎯 " + hunt.challenges[i].clue;
  document.getElementById("camCard").classList.remove("hidden");
  document.getElementById("status").className = "status hidden";
  document.getElementById("camCard").scrollIntoView({behavior:"smooth"});
  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      document.getElementById("video").srcObject = stream;
    } catch (e) {
      alert("Could not access the camera. Allow camera permission and reload.");
    }
  }
}

function closeCam() {
  document.getElementById("camCard").classList.add("hidden");
  activeIdx = null;
}

async function snap() {
  if (activeIdx === null) return;
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  const image = canvas.toDataURL("image/jpeg", 0.7);

  const status = document.getElementById("status");
  status.className = "status busy";
  status.innerHTML = '<span class="spinner"></span> AI is checking your photo…';

  try {
    const res = await fetch("/api/verify", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ clue: hunt.challenges[activeIdx].clue, image })
    });
    const r = await res.json();
    if (r.match) {
      status.className = "status ok";
      status.textContent = "✅ " + (r.reason || "Nice find!");
      markDone(activeIdx);
      setTimeout(closeCam, 1200);
    } else {
      status.className = "status no";
      status.textContent = "❌ " + (r.reason || "Not quite — try again!");
    }
  } catch (e) {
    status.className = "status no";
    status.textContent = "Verification failed — check the server.";
  }
}

function markDone(i) {
  const c = hunt.challenges[i];
  if (c.done) return;
  c.done = true;
  score += c.points;
  document.getElementById("score").textContent = score;
  const el = document.getElementById("ch-" + i);
  el.classList.add("done");
  el.querySelector("button").outerHTML = '<span class="check">✔ Completed</span>';
  if (hunt.challenges.every(x => x.done)) finish();
}

async function finish() {
  const res = await fetch("/api/recap", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      hunt_title: hunt.hunt_title, score,
      completed: hunt.challenges.map(c => c.title)
    })
  });
  const r = await res.json();
  document.getElementById("game").classList.add("hidden");
  document.getElementById("recapText").textContent = r.recap;
  document.getElementById("recapCard").classList.remove("hidden");
  document.getElementById("recapCard").scrollIntoView({behavior:"smooth"});
}
</script>
</body>
</html>
